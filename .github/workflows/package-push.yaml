name: 'Package Pushed'

on:
    push:
        branches:
            - main
        paths:
            - packages/**
    workflow_dispatch:
        inputs:
            packages:
                description: 'Space-separated list of packages to build (e.g. "python-3.12.0 gcc-15.2.0"). Leave empty to auto-detect.'
                required: false
                default: ''

jobs:
    build-pkg:
        name: Build package
        runs-on: ubuntu-latest
        outputs:
            has_packages: ${{ steps.build.outputs.has_packages }}
        steps:
            - name: Checkout
              uses: actions/checkout@v3
              with:
                  fetch-depth: 2

            - name: Login to GitHub registry
              uses: docker/login-action@v2
              with:
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
                  registry: docker.pkg.github.com

            - name: Build Packages
              id: build
              run: |
                  mkdir -p packages
                  chmod +x repo/entrypoint.sh repo/mkindex.sh
                  docker build -t repo-builder repo

                  # Determine which packages to build
                  if [ -n "${{ github.event.inputs.packages }}" ]; then
                    PACKAGES="${{ github.event.inputs.packages }}"
                    echo "Manual trigger: building $PACKAGES"
                  elif [ "${{ github.event_name }}" = "push" ]; then
                    # Use only ADDED/MODIFIED files (not deleted) to avoid building removed packages
                    PACKAGES=$(git diff --name-only --diff-filter=ACMR HEAD~1 HEAD -- packages/ \
                      | awk -F/ '$2 && $3 { print $2 "-" $3 }' | sort -u)
                    echo "Push event: detected packages: $PACKAGES"
                  else
                    echo "Unknown trigger, no packages to build"
                    PACKAGES=""
                  fi

                  if [ -z "$PACKAGES" ]; then
                    echo "No package changes detected, skipping build"
                    echo "has_packages=false" >> $GITHUB_OUTPUT
                    exit 0
                  fi

                  echo "Building: $PACKAGES"
                  docker run -v "${{ github.workspace }}:/compiler" repo-builder --no-server $PACKAGES
                  ls -la packages/

                  if ls packages/*.pkg.tar.gz 1>/dev/null 2>&1; then
                    echo "has_packages=true" >> $GITHUB_OUTPUT
                  else
                    echo "has_packages=false" >> $GITHUB_OUTPUT
                    echo "Build ran but produced no .pkg.tar.gz files"
                    exit 1
                  fi

            - name: Upload Packages
              if: steps.build.outputs.has_packages == 'true'
              uses: svenstaro/upload-release-action@v2
              with:
                  repo_token: ${{ secrets.GITHUB_TOKEN }}
                  file: packages/*.pkg.tar.gz
                  tag: pkgs
                  overwrite: true
                  file_glob: true

    create-index:
        name: Create Index
        runs-on: ubuntu-latest
        needs: build-pkg
        if: needs.build-pkg.outputs.has_packages == 'true'
        steps:
            - name: 'Download all release assets'
              run: |
                  URLS=$(curl -s https://api.github.com/repos/shoyim/compiler/releases/latest | jq -r '.assets[]? | .browser_download_url')
                  if [ -z "$URLS" ]; then
                    echo "No release assets found"
                    exit 1
                  fi
                  echo "$URLS" | xargs -r -L 1 curl -sLO
            - name: 'Generate index file'
              run: |
                  echo "" > index
                  BASEURL=https://github.com/shoyim/compiler/releases/download/pkgs/
                  for pkg in *.pkg.tar.gz
                  do
                    PKGFILE=$(basename $pkg)
                    PKGFILENAME=$(echo $PKGFILE | sed 's/\.pkg\.tar\.gz//g')

                    PKGNAME=$(echo $PKGFILENAME | grep -oP '^\K.+(?=-)')
                    PKGVERSION=$(echo $PKGFILENAME | grep -oP '^.+-\K.+')
                    PKGCHECKSUM=$(sha256sum $PKGFILE | awk '{print $1}')
                    echo "$PKGNAME,$PKGVERSION,$PKGCHECKSUM,$BASEURL$PKGFILE" >> index
                    echo "Adding package $PKGNAME-$PKGVERSION"
                  done
            - name: Upload index
              uses: svenstaro/upload-release-action@v2
              with:
                  repo_token: ${{ secrets.GITHUB_TOKEN }}
                  file: index
                  tag: pkgs
                  overwrite: true
                  file_glob: true

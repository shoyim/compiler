name: 'Package Pushed'

on:
  push:
    branches:
      - main
    paths:
      - 'packages/**'

jobs:
  build-pkg:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get list of changed files
        id: files
        uses: lots0logs/gh-action-get-changed-files@2.1.4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Packages
        run: |
          PACKAGES=$(jq '.[]' -r ${HOME}/files*.json | awk -F/ '$1~/packages/ && $2 && $3{ print $2 "-" $3 }' | sort -u)
          docker pull ghcr.io/${{ github.repository }}/repo-builder:latest || true
          docker build -t repo-builder repo
          docker run -v "${{ github.workspace }}:/piston" repo-builder --no-server $PACKAGES

      - name: Upload Packages to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: pkgs
          files: packages/*.pkg.tar.gz
          overwrite: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-index:
    runs-on: ubuntu-latest
    needs: build-pkg
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate index file
        run: |
          mkdir -p assets
          cd assets
          
          curl -s https://api.github.com/repos/${{ github.repository }}/releases/tags/pkgs | \
          jq -r '.assets[] | select(.name != "index") | .browser_download_url' | \
          xargs -I {} curl -sLO {} || true
          
          echo -n "" > ../index
          BASEURL="https://github.com/${{ github.repository }}/releases/download/pkgs/"
          
          for pkg in *.pkg.tar.gz; do
            if [ -f "$pkg" ]; then
              PKGFILE=$(basename "$pkg")
              PKGFILENAME=$(echo "$PKGFILE" | sed 's/\.pkg\.tar\.gz//g')
              PKGNAME=$(echo "$PKGFILENAME" | rev | cut -d'-' -f2- | rev)
              PKGVERSION=$(echo "$PKGFILENAME" | rev | cut -d'-' -f1 | rev)
              PKGCHECKSUM=$(sha256sum "$PKGFILE" | awk '{print $1}')
              echo "$PKGNAME,$PKGVERSION,$PKGCHECKSUM,$BASEURL$PKGFILE" >> ../index
            fi
          done

      - name: Upload Index to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: pkgs
          files: index
          overwrite: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
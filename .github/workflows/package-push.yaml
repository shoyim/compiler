name: 'Package Pushed'

on:
  push:
    branches:
      - main
    paths:
      - 'packages/**'

jobs:
  build-pkg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io

      - name: Get list of changed files
        uses: lots0logs/gh-action-get-changed-files@2.1.4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Packages
        run: |
          PACKAGES=$(jq '.[]' -r ${HOME}/files*.json | awk -F/ '$1~/packages/ && $2 && $3{ print $2 "-" $3 }' | sort -u)
          docker pull ghcr.io/${{ github.repository }}/repo-builder:latest || true
          docker build -t repo-builder repo
          docker run -v "${{ github.workspace }}:/piston" repo-builder --no-server $PACKAGES

      - name: Upload Packages to Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: packages/*.pkg.tar.gz
          tag: pkgs
          overwrite: true
          file_glob: true

  create-index:
    runs-on: ubuntu-latest
    needs: build-pkg
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate index file
        run: |
          mkdir -p assets
          cd assets
          curl -s https://api.github.com/repos/${{ github.repository }}/releases/tags/pkgs | jq '.assets[].browser_download_url' -r | xargs -L 1 curl -sLO || true
          echo -n "" > ../index
          BASEURL="https://github.com/${{ github.repository }}/releases/download/pkgs/"
          for pkg in *.pkg.tar.gz; do
            if [ -f "$pkg" ]; then
              PKGFILE=$(basename "$pkg")
              PKGFILENAME=$(echo "$PKGFILE" | sed 's/\.pkg\.tar\.gz//g')
              PKGNAME=$(echo "$PKGFILENAME" | rev | cut -d'-' -f2- | rev)
              PKGVERSION=$(echo "$PKGFILENAME" | rev | cut -d'-' -f1 | rev)
              PKGCHECKSUM=$(sha256sum "$PKGFILE" | awk '{print $1}')
              echo "$PKGNAME,$PKGVERSION,$PKGCHECKSUM,$BASEURL$PKGFILE" >> ../index
            fi
          done

      - name: Upload index
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: index
          tag: pkgs
          overwrite: true
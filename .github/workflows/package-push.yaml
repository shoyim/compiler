name: 'Package Pushed'

on:
  push:
    branches:
      - main
    paths:
      - 'packages/**'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-pkg:
    name: Build package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Packages
        run: |
          mkdir -p packages
          chmod +x repo/entrypoint.sh repo/mkindex.sh
          docker build -t repo-builder repo
          docker run --rm -v "${{ github.workspace }}:/compiler" repo-builder --no-server
          ls -la packages/

      - name: Upload Packages
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: packages/*.pkg.tar.gz
          tag: pkgs
          overwrite: true
          file_glob: true

  create-index:
    name: Create Index
    runs-on: ubuntu-latest
    needs: build-pkg
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Generate index file
        run: |
          echo "" > index
          BASEURL="https://github.com/${{ github.repository }}/releases/download/pkgs/"
          
          # Oxirgi relizdan fayllarni yuklab olish (agar mavjud bo'lsa)
          curl -s https://api.github.com/repos/${{ github.repository }}/releases/tags/pkgs \
            | jq -r '.assets[].browser_download_url' \
            | xargs -n 1 curl -L -O || true

          for pkg in *.pkg.tar.gz; do
            if [ -f "$pkg" ]; then
              PKGFILE=$(basename "$pkg")
              PKGFILENAME="${PKGFILE%.pkg.tar.gz}"
              PKGNAME=$(echo "$PKGFILENAME" | cut -d'-' -f1)
              PKGVERSION=$(echo "$PKGFILENAME" | cut -d'-' -f2-)
              PKGCHECKSUM=$(sha256sum "$pkg" | awk '{print $1}')
              echo "$PKGNAME,$PKGVERSION,$PKGCHECKSUM,$BASEURL$PKGFILE" >> index
            fi
          done

      - name: Upload index
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: index
          tag: pkgs
          overwrite: true
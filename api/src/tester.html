  <style>
    /* ── Theme variables ─────────────────────────────────── */
    :root {
      --page-bg:   #030712; --panel-bg:  #111827; --border:    #1f2937;
      --text:      #e2e8f0; --text-dim:  #9ca3af; --text-muted:#6b7280;
      --inp-bg:    #1f2937; --inp-bd:    #374151; --inp-text:  #e2e8f0;
      --tab-a-bg:  #1e293b; --tab-a-txt: #e2e8f0; --tab-i-txt: #64748b;
      --pro-bg:    #1f2937; --pro-bd:    #374151;
      --pre-bg:    #0f172a; --pre-text:  #e2e8f0; --pre-err:   #fca5a5;
      --cm-theme: monokai;
    }
    html.light {
      --page-bg:   #f8fafc; --panel-bg:  #ffffff; --border:    #e2e8f0;
      --text:      #0f172a; --text-dim:  #64748b; --text-muted:#94a3b8;
      --inp-bg:    #ffffff; --inp-bd:    #cbd5e1; --inp-text:  #0f172a;
      --tab-a-bg:  #f1f5f9; --tab-a-txt: #0f172a; --tab-i-txt: #64748b;
      --pro-bg:    #f1f5f9; --pro-bd:    #e2e8f0;
      --pre-bg:    #1e293b; --pre-text:  #e2e8f0; --pre-err:   #fca5a5;
    }

    body { background:var(--page-bg); color:var(--text); transition:background .15s,color .15s; }

    /* ── Theme helper classes ─────────────────────────────── */
    .th-panel    { background:var(--panel-bg); }
    .th-border   { border-color:var(--border)  !important; }
    .th-text     { color:var(--text); }
    .th-text-dim { color:var(--text-dim); }
    .th-text-muted { color:var(--text-muted); }
    .th-page     { background:var(--page-bg); }
    .th-inp      { background:var(--inp-bg)!important; border-color:var(--inp-bd)!important; color:var(--inp-text)!important; }
    .th-tab-a    { background:var(--tab-a-bg); color:var(--tab-a-txt); }
    .th-tab-i    { color:var(--tab-i-txt); }
    .th-tab-i:hover { color:var(--text-dim); background:var(--tab-a-bg); }
    .th-pro-btn  { background:var(--pro-bg); border-color:var(--pro-bd); }
    .th-pro-menu { background:var(--panel-bg); border-color:var(--border); }
    .th-pro-item { color:var(--text-dim); }
    .th-pro-item:hover { background:var(--tab-a-bg); }

    /* ── CodeMirror ───────────────────────────────────────── */
    #cmEditor { overflow:hidden; }
    .CodeMirror {
      height:100%;
      font-family:'Cascadia Code','Fira Code','JetBrains Mono',Consolas,monospace;
      font-size:13px;
      line-height:1.6;
    }
    .CodeMirror-scroll { padding-bottom:8px; }

    /* ── Output ───────────────────────────────────────────── */
    .output-pre {
      font-family:'Cascadia Code','Fira Code',Consolas,monospace;
      font-size:12px; line-height:1.6;
      white-space:pre-wrap; word-break:break-all;
    }

    .run-btn-glow { box-shadow:0 0 20px rgba(34,197,94,.4); }
    .spin  { animation:spin 1s linear infinite; }
    @keyframes spin    { to { transform:rotate(360deg); } }
    .toast { animation:slideIn .25s ease; }
    @keyframes slideIn { from { transform:translateX(110%); } to { transform:none; } }
  </style>
</head>
<body class="min-h-screen font-sans">

<div id="toasts" class="fixed top-4 right-4 z-50 flex flex-col gap-2 w-80 pointer-events-none"></div>

<!-- Profile modal -->

    </div>
    <div class="space-y-3">

      <div><label class="block text-xs font-medium th-text-dim mb-1">Yangi parol</label>

<script>
// ── Auth ──────────────────────────────────────────────────────────────────
const authToken = localStorage.getItem('auth_token');
if (!authToken) window.location.href = '/login';
document.getElementById('headerUser').textContent = localStorage.getItem('auth_user') || '?';

function authHeaders() {
  return { 'Content-Type':'application/json', 'Authorization':'Bearer '+authToken };
}
async function logout() {
  await fetch('/auth/logout', { method:'POST', headers:authHeaders() }).catch(()=>{});
  localStorage.clear(); window.location.href = '/login';
}
function toggleProfileMenu() { document.getElementById('profileMenu').classList.toggle('hidden'); }
function closeProfileMenu()  { document.getElementById('profileMenu').classList.add('hidden'); }
document.addEventListener('click', e => {
  if (!document.getElementById('profileDropdown').contains(e.target)) closeProfileMenu();
});
function openProfileModal() {
  document.getElementById('profileModal').classList.remove('hidden');
  document.getElementById('curPass').focus();
}
function closeProfileModal() {
  document.getElementById('profileModal').classList.add('hidden');
  ['curPass','newPass1','newPass2'].forEach(id => document.getElementById(id).value = '');
}
document.getElementById('profileModal').addEventListener('click', e => {
  if (e.target === document.getElementById('profileModal')) closeProfileModal();
});
async function submitProfileChange() {
  const cur = document.getElementById('curPass').value;
  const n1  = document.getElementById('newPass1').value;
  const n2  = document.getElementById('newPass2').value;
  if (!cur || !n1) { toast('Barcha maydonlarni to\'ldiring', 'error'); return; }
  if (n1 !== n2)   { toast('Yangi parollar mos kelmadi', 'error'); return; }
  try {
    const res  = await fetch('/auth/profile', { method:'PUT', headers:authHeaders(), body:JSON.stringify({ current_password:cur, new_password:n1 }) });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message);
    toast(data.message, 'success');
    closeProfileModal();
  } catch(e) { toast(e.message, 'error'); }
}

// ── Dark / Light theme ────────────────────────────────────────────────────
let isDark = localStorage.getItem('cm-theme') !== 'light';

function applyTheme() {
  document.getElementById('root').classList.toggle('light', !isDark);
  document.getElementById('themeIcon').className =
    isDark ? 'fa-solid fa-sun text-xs th-text-dim'
           : 'fa-solid fa-moon text-xs th-text-dim';
  localStorage.setItem('cm-theme', isDark ? 'dark' : 'light');
  // Re-apply language-specific theme for new dark/light state
  if (currentEditorLang) applyLangStyle(currentEditorLang);
  else editor.setOption('theme', isDark ? 'monokai' : 'idea');
}

function toggleTheme() {
  isDark = !isDark;
  applyTheme();
}

  tabBar.style.borderLeftWidth = '3px';
  tabBar.style.borderLeftStyle = 'solid';

  document.getElementById('langAccentDot').style.background = lt.color;

async function loadRuntimes() {
  try {
    const res = await fetch('/api/v2/runtimes');
    runtimes = await res.json();
    const grouped = {};
    runtimes.forEach(rt => {
      if (!grouped[rt.language]) grouped[rt.language] = [];
      grouped[rt.language].push(rt.version);
    });
    const sel = document.getElementById('langSelect');
    sel.innerHTML = Object.keys(grouped).sort().map(l =>
      `<option value="${l}">${l}</option>`
    ).join('');
    updateVersions();
  } catch(e) {
    toast('Runtime\'larni yuklab bo\'lmadi', 'error');
  }
}

function updateVersions() {
  const lang = document.getElementById('langSelect').value;
  const versions = runtimes.filter(rt => rt.language === lang).map(rt => rt.version);
  const sel = document.getElementById('versionSelect');
  sel.innerHTML = versions.map(v => `<option value="${v}">${v}</option>`).join('');
  applyExample(lang);
  updateFileName(lang);
}

function applyExample(lang) {
  if (editor.getValue().trim() === '' || currentEditorLang !== lang) {
    const ex = EXAMPLES[lang] || EXAMPLES.default;
    editor.setValue(ex.code);
    if (!document.getElementById('stdinArea').value.trim()) {
      document.getElementById('stdinArea').value = ex.stdin;
    }
  }
  editor.setOption('mode', LANG_MODES[lang] || 'text/plain');
  currentEditorLang = lang;
  applyLangStyle(lang);
}

function updateFileName(lang) {
  const ex = EXAMPLES[lang] || EXAMPLES.default;
  document.getElementById('fileNameLabel').textContent = 'main.' + ex.ext;
}

document.getElementById('langSelect').addEventListener('change', updateVersions);

// ── Run ───────────────────────────────────────────────────────────────────
let running = false;
let showCompileTab = false;

async function runCode() {
  if (running) return;
  const code = editor.getValue().trim();
  if (!code) { toast('Kod bo\'sh', 'error'); return; }

  const lang    = document.getElementById('langSelect').value;
  const version = document.getElementById('versionSelect').value;
  const stdin   = document.getElementById('stdinArea').value;
  if (!lang) { toast('Tilni tanlang', 'error'); return; }

  running = true;
  const runBtn  = document.getElementById('runBtn');
  const runIcon = document.getElementById('runIcon');
  const runText = document.getElementById('runText');
  runBtn.disabled = true;
  runBtn.classList.remove('run-btn-glow','bg-green-600','hover:bg-green-500');
  runBtn.classList.add('bg-gray-600');
  runIcon.className = 'fa-solid fa-circle-notch spin text-xs';
  runText.textContent = 'Bajarilmoqda...';

  document.getElementById('statusBar').classList.add('hidden');
  document.getElementById('runStats').classList.add('hidden');
  document.getElementById('outputPanel').innerHTML = `
    <div class="flex items-center gap-2 th-text-muted text-sm py-8 justify-center">
      <i class="fa-solid fa-circle-notch spin text-green-500 text-lg"></i>
      <span>Kod bajarilmoqda...</span>
    </div>`;

  const startTime = Date.now();
  try {
    const res = await fetch('/api/v2/execute', {
      method: 'POST',
      headers: authHeaders(),
      body: JSON.stringify({
        language: lang,
        version,
        files: [{ name: document.getElementById('fileNameLabel').textContent, content: editor.getValue() }],
        stdin,
      }),
    });
    const elapsed = Date.now() - startTime;
    if (res.status === 401) { logout(); return; }
    if (!res.ok) {
      const e = await res.json().catch(() => ({ message:'Server xatosi' }));
      showError(e.message); return;
    }
    renderOutput(await res.json(), elapsed);
  } catch(e) {
    showError('Serverga ulanib bo\'lmadi: ' + e.message);
  } finally {
    running = false;
    runBtn.disabled = false;
    runBtn.classList.add('run-btn-glow','bg-green-600','hover:bg-green-500');
    runBtn.classList.remove('bg-gray-600');
    runIcon.className = 'fa-solid fa-play text-xs';
    runText.textContent = 'Ishga tushirish';
  }
}

// ── Output rendering ──────────────────────────────────────────────────────
function renderOutput(data, clientMs) {
  const run     = data.run;
  const compile = data.compile;
  const hasCompile = compile && compile.code !== null && compile.code !== undefined;
  showCompileTab = hasCompile;
  document.getElementById('tab-compile').classList.toggle('hidden', !hasCompile);

  const statusBar = document.getElementById('statusBar');
  statusBar.classList.remove('hidden');

  let badge, color;
  if (run.status === 'timed_out') {
    badge = '<span class="flex items-center gap-1.5 text-xs font-bold text-yellow-400"><i class="fa-solid fa-clock"></i>Timeout</span>';
    color = 'border-yellow-500/30 bg-yellow-500/5';
  } else if (run.status === 'memory_limit') {
    badge = '<span class="flex items-center gap-1.5 text-xs font-bold text-orange-400"><i class="fa-solid fa-microchip"></i>Memory Limit</span>';
    color = 'border-orange-500/30 bg-orange-500/5';
  } else if (run.code === 0) {
    badge = '<span class="flex items-center gap-1.5 text-xs font-bold text-green-400"><i class="fa-solid fa-circle-check"></i>OK · exit 0</span>';
    color = 'border-green-500/30 bg-green-500/5';
  } else {
    badge = `<span class="flex items-center gap-1.5 text-xs font-bold text-red-400"><i class="fa-solid fa-circle-xmark"></i>Xato · exit ${run.code}</span>`;
    color = 'border-red-500/30 bg-red-500/5';
  }

  document.getElementById('statusBadge').innerHTML = badge;

  const d = [];
  if (run.time)   d.push(`<span><i class="fa-solid fa-clock mr-1"></i>${run.time}ms</span>`);
  if (run.memory) d.push(`<span><i class="fa-solid fa-microchip mr-1"></i>${run.memory}KB</span>`);
  d.push(`<span><i class="fa-solid fa-stopwatch mr-1"></i>~${clientMs}ms</span>`);
  d.push(`<span>${data.language} ${data.version}</span>`);
  document.getElementById('statusDetails').innerHTML = d.join('');

  document.getElementById('runStats').classList.remove('hidden');
  document.getElementById('statTime').innerHTML = `<i class="fa-solid fa-clock"></i>${run.time||'—'}ms`;
  document.getElementById('statMem').innerHTML  = `<i class="fa-solid fa-microchip"></i>${run.memory||'—'}KB`;

  document.getElementById('outputPanel').innerHTML = buildOutputHtml(run);
  document.getElementById('compilePanel').innerHTML = hasCompile ? buildOutputHtml(compile) : '';
  switchOutputTab('output');
}

function buildOutputHtml(stage) {
  const hasOut = stage.stdout && stage.stdout.length > 0;
  const hasErr = stage.stderr && stage.stderr.length > 0;
  if (!hasOut && !hasErr) return '<p class="th-text-muted text-xs italic py-4">Chiqish yo\'q</p>';
  let html = '';
  if (hasOut) html += `
    <div class="mb-4">
      <p class="text-[10px] font-semibold uppercase tracking-wider text-green-500/70 mb-2">stdout</p>
      <pre class="output-pre rounded-xl p-4 overflow-auto" style="background:var(--pre-bg);color:var(--pre-text)">${escHtml(stage.stdout)}</pre>
    </div>`;
  if (hasErr) html += `
    <div>
      <p class="text-[10px] font-semibold uppercase tracking-wider text-red-500/70 mb-2">stderr</p>
      <pre class="output-pre rounded-xl p-4 overflow-auto" style="background:var(--pre-bg);color:var(--pre-err)">${escHtml(stage.stderr)}</pre>
    </div>`;
  return html;
}

function showError(msg) {
  document.getElementById('statusBar').classList.add('hidden');
  document.getElementById('outputPanel').innerHTML = `
    <div class="bg-red-500/10 border border-red-500/20 rounded-xl p-4">
      <p class="text-xs font-bold text-red-400 mb-1"><i class="fa-solid fa-circle-xmark mr-1"></i>Xato</p>
      <p class="text-xs text-red-300">${escHtml(msg)}</p>
    </div>`;
}

function switchOutputTab(tab) {
  ['output','compile'].forEach(t => {
    const btn = document.getElementById('tab-' + t);
    const isActive = t === tab;
    const shouldHide = t === 'compile' && !showCompileTab;
    btn.className = isActive
      ? 'th-tab-a px-3 py-1 rounded-md text-xs font-medium transition-colors'
      : 'th-tab-i px-3 py-1 rounded-md text-xs font-medium transition-colors' + (shouldHide ? ' hidden' : '');
    document.getElementById(t + 'Panel').classList.toggle('hidden', !isActive);
  });
}

function escHtml(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Editor controls ───────────────────────────────────────────────────────
function clearCode() {
  editor.setValue('');
  currentEditorLang = '';
}
function clearOutput() {
  document.getElementById('outputPanel').innerHTML = `
    <div class="text-center py-16 th-text-muted">
      <i class="fa-solid fa-terminal text-4xl mb-4 block opacity-30"></i>
      <p class="text-sm">Kodni ishga tushiring</p>
    </div>`;
  document.getElementById('statusBar').classList.add('hidden');
  document.getElementById('runStats').classList.add('hidden');
  document.getElementById('compilePanel').innerHTML = '';
  showCompileTab = false;
  document.getElementById('tab-compile').classList.add('hidden');
}
function copyCode() {
  navigator.clipboard.writeText(editor.getValue()).then(() => toast('Kod nusxalandi', 'success'));
}

// ── Toast ─────────────────────────────────────────────────────────────────
function toast(msg, type = 'info') {
  const c = { success:'bg-green-500', error:'bg-red-500', info:'bg-sky-500' };
  const i = { success:'fa-circle-check', error:'fa-circle-xmark', info:'fa-circle-info' };
  const el = document.createElement('div');
  el.className = `toast pointer-events-auto flex items-center gap-3 px-4 py-3 rounded-xl text-white text-sm shadow-lg ${c[type]}`;
  el.innerHTML = `<i class="fa-solid ${i[type]} flex-shrink-0"></i><span>${msg}</span>`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => { el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(()=>el.remove(),300); }, 3500);
}

// ── Init ──────────────────────────────────────────────────────────────────
applyTheme();
loadRuntimes();
editor.focus();
</script>

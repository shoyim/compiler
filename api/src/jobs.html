<!DOCTYPE html>
<html lang="uz" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Joblar — Compiler</title>
  <script>
    tailwind.config = { darkMode: 'class' };
    (function(){
      const t = localStorage.getItem('theme');
      if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches))
        document.documentElement.classList.add('dark');
    })();
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .toast  { animation: slideIn .25s ease; }
    @keyframes slideIn { from { transform:translateX(110%); } to { transform:none; } }
    .spin   { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .row-in { animation: fadeIn .12s ease; }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    .sel-bar { animation: slideUp .2s ease; }
    @keyframes slideUp { from { transform:translateY(100%); opacity:0; } to { transform:none; opacity:1; } }
    .detail-slide { animation: slideLeft .2s ease; }
    @keyframes slideLeft { from { transform:translateX(100%); } to { transform:none; } }
    .code-block {
      font-family: 'Cascadia Code', 'Fira Mono', 'Consolas', monospace;
      font-size: 12.5px;
      line-height: 1.65;
      white-space: pre;
      overflow-x: auto;
      tab-size: 4;
    }
  </style>
</head>
<body class="h-full bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-100 font-sans transition-colors">

<!-- Toasts -->
<div id="toasts" class="fixed top-4 right-4 z-[60] flex flex-col gap-2 w-80 pointer-events-none"></div>

<!-- Profile modal -->
<div id="profileModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50">
  <div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl shadow-2xl w-full max-w-sm p-6">
    <div class="flex items-center justify-between mb-5">
      <h2 class="text-base font-bold text-slate-800 dark:text-white flex items-center gap-2">
        <i class="fa-solid fa-lock text-slate-400"></i>Parolni o'zgartirish
      </h2>
      <button onclick="closeProfileModal()" class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>
    <div class="space-y-3">
      <div>
        <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">Joriy parol</label>
        <input id="curPass" type="password" placeholder="••••••••"
          class="w-full text-sm border border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-900 text-slate-800 dark:text-white rounded-lg px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-sky-500">
      </div>
      <div>
        <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">Yangi parol</label>
        <input id="newPass1" type="password" placeholder="••••••••"
          class="w-full text-sm border border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-900 text-slate-800 dark:text-white rounded-lg px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-sky-500">
      </div>
      <div>
        <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">Tasdiqlang</label>
        <input id="newPass2" type="password" placeholder="••••••••"
          class="w-full text-sm border border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-900 text-slate-800 dark:text-white rounded-lg px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-sky-500">
      </div>
      <button onclick="submitProfileChange()"
        class="w-full py-2.5 bg-sky-600 hover:bg-sky-500 text-white text-sm font-semibold rounded-lg transition-colors">
        Saqlash
      </button>
    </div>
  </div>
</div>

<!-- Detail panel -->
<div id="detailPanel" class="hidden fixed inset-0 z-40 flex">
  <div class="flex-1 bg-black/40 backdrop-blur-sm" onclick="closeDetail()"></div>
  <div class="detail-slide w-full sm:max-w-2xl bg-white dark:bg-slate-900 border-l border-slate-200 dark:border-slate-800 shadow-2xl flex flex-col overflow-hidden">

    <!-- Panel header -->
    <div class="flex items-center gap-3 px-5 py-3.5 border-b border-slate-100 dark:border-slate-800 flex-shrink-0">
      <button onclick="closeDetail()" class="flex items-center gap-1.5 text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 text-xs transition-colors">
        <i class="fa-solid fa-chevron-left"></i> Orqaga
      </button>
      <div id="detailTitle" class="flex-1 min-w-0"></div>
      <button onclick="deleteJobFromPanel()" id="detailDeleteBtn"
        class="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 border border-red-200 dark:border-red-800/50 rounded-lg transition-colors">
        <i class="fa-solid fa-trash-can"></i>
        <span class="hidden sm:inline">O'chirish</span>
      </button>
    </div>

    <!-- Tabs -->
    <div class="flex border-b border-slate-100 dark:border-slate-800 flex-shrink-0">
      <button id="tabKod" onclick="switchTab('kod')"
        class="tab-btn flex items-center gap-2 px-5 py-2.5 text-xs font-semibold border-b-2 transition-colors border-sky-500 text-sky-600 dark:text-sky-400">
        <i class="fa-solid fa-code"></i> Kod
      </button>
      <button id="tabNatija" onclick="switchTab('natija')"
        class="tab-btn flex items-center gap-2 px-5 py-2.5 text-xs font-semibold border-b-2 transition-colors border-transparent text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300">
        <i class="fa-solid fa-square-terminal"></i> Natija
      </button>
    </div>

    <!-- Tab: Kod -->
    <div id="panelKod" class="flex-1 overflow-y-auto flex flex-col min-h-0">
      <div id="kodContent" class="flex-1 p-4"></div>
    </div>

    <!-- Tab: Natija -->
    <div id="panelNatija" class="hidden flex-1 overflow-y-auto p-5 space-y-4"></div>
  </div>
</div>

<!-- Header -->
<header class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 sticky top-0 z-40 shadow-sm">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-between gap-3">
    <div class="flex items-center gap-4">
      <a href="/dashboard" class="flex items-center gap-2.5">
        <div class="w-8 h-8 bg-sky-600 rounded-lg flex items-center justify-center flex-shrink-0">
          <i class="fa-solid fa-code text-white text-sm"></i>
        </div>
        <span class="text-sm font-bold text-slate-800 dark:text-white hidden sm:block">Compiler</span>
      </a>
      <nav class="flex items-center gap-0.5">
        <a href="/dashboard" class="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium rounded-lg text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 hover:text-slate-700 dark:hover:text-white transition-colors">
          <i class="fa-solid fa-gauge-high"></i><span class="hidden sm:inline">Dashboard</span>
        </a>
        <a href="/tester" class="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium rounded-lg text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 hover:text-slate-700 dark:hover:text-white transition-colors">
          <i class="fa-solid fa-play"></i><span class="hidden sm:inline">Tester</span>
        </a>
        <a href="/jobs" class="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium rounded-lg bg-sky-600 text-white">
          <i class="fa-solid fa-list-check"></i><span>Joblar</span>
        </a>
        <a href="/tokens" class="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium rounded-lg text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 hover:text-slate-700 dark:hover:text-white transition-colors">
          <i class="fa-solid fa-key"></i><span class="hidden sm:inline">Tokenlar</span>
        </a>
        <a href="/api-docs" class="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium rounded-lg text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 hover:text-slate-700 dark:hover:text-white transition-colors">
          <i class="fa-solid fa-book"></i><span class="hidden md:inline">API</span>
        </a>
      </nav>
    </div>
    <div class="flex items-center gap-1.5">
      <button onclick="toggleTheme()" title="Mavzu"
        class="w-8 h-8 flex items-center justify-center rounded-lg text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
        <i id="themeIcon" class="fa-solid fa-moon text-sm"></i>
      </button>
      <button onclick="loadJobs()" title="Yangilash"
        class="w-8 h-8 flex items-center justify-center rounded-lg text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
        <i id="refreshIcon" class="fa-solid fa-arrows-rotate text-sm"></i>
      </button>
      <div class="relative" id="profileDropdown">
        <button onclick="toggleProfileMenu()"
          class="flex items-center gap-2 px-2.5 py-1.5 bg-sky-50 dark:bg-sky-900/30 border border-sky-200 dark:border-sky-800 rounded-lg hover:bg-sky-100 dark:hover:bg-sky-900/50 transition-colors">
          <i class="fa-solid fa-circle-user text-sky-500 dark:text-sky-400 text-sm"></i>
          <span id="headerUser" class="text-xs font-semibold text-sky-700 dark:text-sky-300">—</span>
          <i class="fa-solid fa-chevron-down text-[9px] text-sky-400"></i>
        </button>
        <div id="profileMenu" class="hidden absolute right-0 mt-1.5 w-48 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl shadow-xl z-50 py-1 overflow-hidden">
          <button onclick="openProfileModal(); closeProfileMenu()"
            class="w-full flex items-center gap-2 px-3 py-2 text-xs text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">
            <i class="fa-solid fa-lock text-slate-400 w-4"></i>Parolni o'zgartirish
          </button>
          <div class="border-t border-slate-100 dark:border-slate-700 my-1"></div>
          <button onclick="logout()"
            class="w-full flex items-center gap-2 px-3 py-2 text-xs text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors">
            <i class="fa-solid fa-right-from-bracket w-4"></i>Chiqish
          </button>
        </div>
      </div>
    </div>
  </div>
</header>

<main class="max-w-7xl mx-auto px-4 sm:px-6 py-6">

  <!-- Filters -->
  <div class="flex flex-wrap gap-2.5 mb-5">
    <div class="relative flex-1 min-w-[180px] max-w-xs">
      <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xs pointer-events-none"></i>
      <input id="searchInput" type="text" placeholder="Username yoki til..."
        class="w-full pl-8 pr-4 py-2 text-sm border border-slate-200 dark:border-slate-700 rounded-xl bg-white dark:bg-slate-900 text-slate-800 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-sky-500 transition-shadow">
    </div>
    <select id="langFilter"
      class="text-sm border border-slate-200 dark:border-slate-700 rounded-xl px-3 py-2 bg-white dark:bg-slate-900 text-slate-700 dark:text-slate-300 focus:outline-none focus:ring-2 focus:ring-sky-500">
      <option value="">Barcha tillar</option>
    </select>
    <select id="statusFilter"
      class="text-sm border border-slate-200 dark:border-slate-700 rounded-xl px-3 py-2 bg-white dark:bg-slate-900 text-slate-700 dark:text-slate-300 focus:outline-none focus:ring-2 focus:ring-sky-500">
      <option value="">Barcha holatlar</option>
      <option value="ok">OK</option>
      <option value="error">Xato</option>
      <option value="timed_out">TLE</option>
      <option value="memory_limit">MLE</option>
    </select>
    <div class="flex items-center gap-1.5 ml-auto text-xs text-slate-500 dark:text-slate-400 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl px-3 py-2">
      Jami: <span id="totalCount" class="font-bold text-slate-700 dark:text-slate-200 ml-1">—</span>
    </div>
  </div>

  <!-- Table card -->
  <div class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full">
        <thead>
          <tr class="border-b border-slate-100 dark:border-slate-800 text-left text-[11px] font-semibold text-slate-400 dark:text-slate-500 uppercase tracking-wider">
            <th class="px-4 py-3 w-10">
              <input type="checkbox" id="selectAll" onchange="toggleSelectAll(this)"
                class="w-3.5 h-3.5 rounded border-slate-300 dark:border-slate-600 text-sky-600 focus:ring-sky-500 cursor-pointer">
            </th>
            <th class="px-4 py-3">Til</th>
            <th class="px-4 py-3 hidden md:table-cell">Foydalanuvchi</th>
            <th class="px-4 py-3">Compile</th>
            <th class="px-4 py-3">Run</th>
            <th class="px-4 py-3 hidden sm:table-cell">Vaqt</th>
            <th class="px-4 py-3 hidden sm:table-cell">Xotira</th>
            <th class="px-4 py-3">Sana</th>
            <th class="px-4 py-3 w-12"></th>
          </tr>
        </thead>
        <tbody id="jobsBody" class="divide-y divide-slate-50 dark:divide-slate-800/60">
          <tr><td colspan="9" class="py-20 text-center text-slate-400 text-sm">
            <i class="fa-solid fa-circle-notch spin text-2xl mb-3 text-sky-500 block"></i>Yuklanmoqda...
          </td></tr>
        </tbody>
      </table>
    </div>

    <!-- Pagination -->
    <div id="pagination" class="hidden px-5 py-3 border-t border-slate-100 dark:border-slate-800 flex items-center justify-between gap-3">
      <button id="prevBtn" onclick="changePage(-1)"
        class="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-slate-600 dark:text-slate-400 border border-slate-200 dark:border-slate-700 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-800 disabled:opacity-40 disabled:cursor-not-allowed transition-colors">
        <i class="fa-solid fa-chevron-left text-[10px]"></i> Oldingi
      </button>
      <span id="pageInfo" class="text-xs text-slate-500 dark:text-slate-400"></span>
      <button id="nextBtn" onclick="changePage(1)"
        class="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-slate-600 dark:text-slate-400 border border-slate-200 dark:border-slate-700 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-800 disabled:opacity-40 disabled:cursor-not-allowed transition-colors">
        Keyingi <i class="fa-solid fa-chevron-right text-[10px]"></i>
      </button>
    </div>
  </div>
</main>

<!-- Bulk action bar -->
<div id="selBar" class="hidden sel-bar fixed bottom-6 left-1/2 -translate-x-1/2 z-50
  flex items-center gap-3 px-5 py-3 rounded-2xl shadow-2xl
  bg-slate-900 dark:bg-white border border-slate-700 dark:border-slate-200">
  <span id="selCount" class="text-sm font-semibold text-white dark:text-slate-800"></span>
  <div class="w-px h-4 bg-slate-600 dark:bg-slate-300"></div>
  <button onclick="deleteSelected()"
    class="flex items-center gap-2 px-4 py-1.5 bg-red-600 hover:bg-red-500 text-white text-xs font-semibold rounded-xl transition-colors">
    <i class="fa-solid fa-trash-can"></i> O'chirish
  </button>
  <button onclick="clearSelection()"
    class="flex items-center gap-2 px-3 py-1.5 text-xs font-medium text-slate-400 dark:text-slate-500 hover:text-white dark:hover:text-slate-800 transition-colors">
    <i class="fa-solid fa-xmark"></i> Bekor
  </button>
</div>

<script>
// ── Theme ──────────────────────────────────────────────────────
function updateThemeIcon() {
  const dark = document.documentElement.classList.contains('dark');
  document.getElementById('themeIcon').className = dark ? 'fa-solid fa-sun text-sm' : 'fa-solid fa-moon text-sm';
}
function toggleTheme() {
  document.documentElement.classList.toggle('dark');
  localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
  updateThemeIcon();
}
updateThemeIcon();

// ── Auth ───────────────────────────────────────────────────────
const authToken = localStorage.getItem('auth_token');
if (!authToken) window.location.href = '/login';
document.getElementById('headerUser').textContent = localStorage.getItem('auth_user') || '?';

function authHeaders() {
  return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + authToken };
}
async function logout() {
  await fetch('/auth/logout', { method: 'POST', headers: authHeaders() }).catch(() => {});
  localStorage.clear(); window.location.href = '/login';
}
function toggleProfileMenu() { document.getElementById('profileMenu').classList.toggle('hidden'); }
function closeProfileMenu()  { document.getElementById('profileMenu').classList.add('hidden'); }
document.addEventListener('click', e => {
  if (!document.getElementById('profileDropdown').contains(e.target)) closeProfileMenu();
});
function openProfileModal() {
  document.getElementById('profileModal').classList.remove('hidden');
  document.getElementById('curPass').focus();
}
function closeProfileModal() {
  document.getElementById('profileModal').classList.add('hidden');
  ['curPass','newPass1','newPass2'].forEach(id => document.getElementById(id).value = '');
}
document.getElementById('profileModal').addEventListener('click', e => {
  if (e.target === document.getElementById('profileModal')) closeProfileModal();
});
async function submitProfileChange() {
  const cur = document.getElementById('curPass').value;
  const n1  = document.getElementById('newPass1').value;
  const n2  = document.getElementById('newPass2').value;
  if (!cur || !n1) { toast('Barcha maydonlarni to\'ldiring', 'error'); return; }
  if (n1 !== n2)   { toast('Yangi parollar mos kelmadi', 'error'); return; }
  try {
    const res = await fetch('/auth/profile', {
      method: 'PUT', headers: authHeaders(),
      body: JSON.stringify({ current_password: cur, new_password: n1 })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message);
    toast(data.message, 'success');
    closeProfileModal();
  } catch(e) { toast(e.message, 'error'); }
}

// ── Lang meta ──────────────────────────────────────────────────
const LANG_META = {
  python:     { icon:'fa-brands fa-python',   color:'#3776AB' },
  node:       { icon:'fa-brands fa-node-js',  color:'#339933' },
  javascript: { icon:'fa-brands fa-js',       color:'#ca8a04' },
  java:       { icon:'fa-brands fa-java',     color:'#ED8B00' },
  c:          { icon:'fa-solid fa-c',         color:'#A8B9CC' },
  'c++':      { icon:'fa-solid fa-code',      color:'#00599C' },
  rust:       { icon:'fa-brands fa-rust',     color:'#CE422B' },
  go:         { icon:'fa-solid fa-g',         color:'#00ACD7' },
  ruby:       { icon:'fa-solid fa-gem',       color:'#CC342D' },
  php:        { icon:'fa-brands fa-php',      color:'#777BB4' },
  bash:       { icon:'fa-solid fa-terminal',  color:'#4EAA25' },
  typescript: { icon:'fa-solid fa-t',         color:'#3178C6' },
  kotlin:     { icon:'fa-solid fa-k',         color:'#7F52FF' },
  swift:      { icon:'fa-brands fa-swift',    color:'#FA7343' },
  pypy:       { icon:'fa-brands fa-python',   color:'#e08e25' },
  pascal:     { icon:'fa-solid fa-p',         color:'#3b82f6' },
  default:    { icon:'fa-solid fa-code',      color:'#6B7280' },
};
function getMeta(lang) { return LANG_META[(lang||'').toLowerCase()] || LANG_META.default; }

function badge(exit, status) {
  if (status === 'timed_out')    return '<span class="inline-flex items-center gap-0.5 px-1.5 py-0.5 rounded-md text-[10px] font-bold bg-yellow-100 dark:bg-yellow-900/40 text-yellow-700 dark:text-yellow-400">TLE</span>';
  if (status === 'memory_limit') return '<span class="inline-flex items-center gap-0.5 px-1.5 py-0.5 rounded-md text-[10px] font-bold bg-orange-100 dark:bg-orange-900/40 text-orange-700 dark:text-orange-400">MLE</span>';
  if (exit === 0 || status === 'ok') return '<span class="inline-flex items-center gap-1 px-1.5 py-0.5 rounded-md text-[10px] font-bold bg-emerald-100 dark:bg-emerald-900/40 text-emerald-700 dark:text-emerald-400"><i class="fa-solid fa-check text-[8px]"></i>OK</span>';
  if (exit !== null && exit !== undefined) return `<span class="inline-flex items-center gap-1 px-1.5 py-0.5 rounded-md text-[10px] font-bold bg-red-100 dark:bg-red-900/40 text-red-700 dark:text-red-400"><i class="fa-solid fa-xmark text-[8px]"></i>${exit}</span>`;
  return '<span class="text-[10px] text-slate-300 dark:text-slate-600">—</span>';
}

function escHtml(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Tab management ─────────────────────────────────────────────
let activeTab = 'kod';
function switchTab(tab) {
  activeTab = tab;
  ['kod','natija'].forEach(t => {
    const btn = document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1));
    const panel = document.getElementById('panel' + t.charAt(0).toUpperCase() + t.slice(1));
    if (t === tab) {
      btn.classList.add('border-sky-500','text-sky-600','dark:text-sky-400');
      btn.classList.remove('border-transparent','text-slate-400','dark:text-slate-500');
      panel.classList.remove('hidden');
      panel.classList.add('flex','flex-col');
    } else {
      btn.classList.remove('border-sky-500','text-sky-600','dark:text-sky-400');
      btn.classList.add('border-transparent','text-slate-400','dark:text-slate-500');
      panel.classList.add('hidden');
      panel.classList.remove('flex','flex-col');
    }
  });
}

// ── State ──────────────────────────────────────────────────────
const PAGE_SIZE = 50;
let currentOffset = 0;
let allLoaded = [];
let selected = new Set();
let currentDetailId = null;

// ── Selection ──────────────────────────────────────────────────
function toggleSelectAll(cb) {
  document.querySelectorAll('.row-cb').forEach(c => {
    c.checked = cb.checked;
    if (cb.checked) selected.add(c.dataset.id);
    else selected.delete(c.dataset.id);
  });
  updateSelBar();
}
function toggleRow(cb) {
  if (cb.checked) selected.add(cb.dataset.id);
  else selected.delete(cb.dataset.id);
  const all = document.querySelectorAll('.row-cb');
  document.getElementById('selectAll').checked = all.length > 0 && [...all].every(c => c.checked);
  updateSelBar();
}
function updateSelBar() {
  const bar = document.getElementById('selBar');
  if (selected.size > 0) {
    bar.classList.remove('hidden');
    document.getElementById('selCount').textContent = `${selected.size} ta tanlandi`;
  } else {
    bar.classList.add('hidden');
  }
}
function clearSelection() {
  selected.clear();
  document.querySelectorAll('.row-cb').forEach(c => c.checked = false);
  document.getElementById('selectAll').checked = false;
  updateSelBar();
}

async function deleteSelected() {
  if (!selected.size) return;
  if (!confirm(`${selected.size} ta jobni o'chirishni tasdiqlaysizmi?`)) return;
  try {
    const res = await fetch('/api/v2/jobs', {
      method: 'DELETE', headers: authHeaders(),
      body: JSON.stringify({ ids: [...selected] }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message);
    toast(data.message, 'success');
    selected.clear(); updateSelBar(); await loadJobs();
  } catch(e) { toast(e.message, 'error'); }
}

async function deleteJobById(id, e) {
  e && e.stopPropagation();
  if (!confirm('Bu jobni o\'chirishni tasdiqlaysizmi?')) return;
  try {
    const res = await fetch(`/api/v2/jobs/${id}`, { method: 'DELETE', headers: authHeaders() });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message);
    toast(data.message, 'success');
    selected.delete(id); updateSelBar(); await loadJobs();
  } catch(e) { toast(e.message, 'error'); }
}

async function deleteJobFromPanel() {
  if (!currentDetailId) return;
  await deleteJobById(currentDetailId);
  closeDetail();
}

// ── Load / Render ──────────────────────────────────────────────
async function loadJobs() {
  document.getElementById('refreshIcon').classList.add('spin');
  const lang = document.getElementById('langFilter').value;
  const params = new URLSearchParams({ limit: PAGE_SIZE, offset: currentOffset });
  if (lang) params.set('language', lang);
  try {
    const res = await fetch('/api/v2/jobs?' + params, { headers: authHeaders() });
    if (res.status === 401) { logout(); return; }
    if (!res.ok) { const e = await res.json().catch(()=>({})); toast(e.message||'Xato','error'); renderEmpty(); return; }
    const data = await res.json();
    allLoaded = data.jobs;
    renderJobs(data.jobs);
    updatePagination(data.jobs.length, data.total);
    populateLangFilter(data.jobs);
    document.getElementById('totalCount').textContent = data.total;
  } catch(e) {
    toast('Serverga ulanib bo\'lmadi','error'); renderEmpty();
  } finally {
    document.getElementById('refreshIcon').classList.remove('spin');
  }
}

function renderEmpty() {
  document.getElementById('jobsBody').innerHTML = `
    <tr><td colspan="9" class="py-20 text-center text-slate-400 dark:text-slate-500 text-sm">
      <i class="fa-solid fa-inbox text-3xl mb-3 block opacity-30"></i>Joblar topilmadi
    </td></tr>`;
}

function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const status = document.getElementById('statusFilter').value;
  const filtered = allLoaded.filter(j => {
    const matchQ = !q || j.language.toLowerCase().includes(q) || (j.username||'').toLowerCase().includes(q);
    let matchS = true;
    if (status === 'ok')           matchS = j.run_exit === 0;
    else if (status === 'error')   matchS = j.run_exit !== 0 && j.run_status !== 'timed_out' && j.run_status !== 'memory_limit';
    else if (status === 'timed_out')     matchS = j.run_status === 'timed_out';
    else if (status === 'memory_limit')  matchS = j.run_status === 'memory_limit';
    return matchQ && matchS;
  });
  renderJobs(filtered);
  document.getElementById('totalCount').textContent = filtered.length;
}

document.getElementById('searchInput').addEventListener('input', applyFilters);
document.getElementById('statusFilter').addEventListener('change', applyFilters);
document.getElementById('langFilter').addEventListener('change', () => { currentOffset = 0; loadJobs(); });

function renderJobs(jobs) {
  if (!jobs.length) { renderEmpty(); return; }
  document.getElementById('jobsBody').innerHTML = jobs.map(j => {
    const m = getMeta(j.language);
    const dt = new Date(j.created_at);
    const timeStr = dt.toLocaleString('uz', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
    const runMs  = j.run_time   != null ? j.run_time + ' ms' : '—';
    const runKb  = j.run_memory != null ? (j.run_memory/1024).toFixed(0) + ' KB' : '—';
    const isSel  = selected.has(j.id);
    return `
    <tr class="row-in hover:bg-slate-50/80 dark:hover:bg-slate-800/40 transition-colors cursor-pointer group ${isSel ? 'bg-sky-50/70 dark:bg-sky-900/15' : ''}">
      <td class="px-4 py-3.5 w-10" onclick="event.stopPropagation()">
        <input type="checkbox" class="row-cb w-3.5 h-3.5 rounded border-slate-300 dark:border-slate-600 text-sky-600 focus:ring-sky-500 cursor-pointer"
          data-id="${j.id}" onchange="toggleRow(this)" ${isSel?'checked':''}>
      </td>
      <td class="px-4 py-3.5" onclick="showDetail('${j.id}')">
        <div class="flex items-center gap-2.5">
          <div class="w-7 h-7 rounded-lg flex items-center justify-center text-xs flex-shrink-0 bg-slate-100 dark:bg-slate-800" style="color:${m.color}">
            <i class="${m.icon}"></i>
          </div>
          <div>
            <div class="text-xs font-semibold text-slate-700 dark:text-slate-200 capitalize">${j.language}</div>
            <div class="text-[10px] text-slate-400 font-mono">v${j.version}</div>
          </div>
        </div>
      </td>
      <td class="px-4 py-3.5 text-xs text-slate-500 dark:text-slate-400 hidden md:table-cell" onclick="showDetail('${j.id}')">${j.username || '<span class="text-slate-300 dark:text-slate-600">—</span>'}</td>
      <td class="px-4 py-3.5" onclick="showDetail('${j.id}')">${j.compile_exit !== null && j.compile_exit !== undefined ? badge(j.compile_exit, j.compile_status) : '<span class="text-[10px] text-slate-300 dark:text-slate-600">—</span>'}</td>
      <td class="px-4 py-3.5" onclick="showDetail('${j.id}')">${badge(j.run_exit, j.run_status)}</td>
      <td class="px-4 py-3.5 text-xs text-slate-500 font-mono hidden sm:table-cell" onclick="showDetail('${j.id}')">${runMs}</td>
      <td class="px-4 py-3.5 text-xs text-slate-500 font-mono hidden sm:table-cell" onclick="showDetail('${j.id}')">${runKb}</td>
      <td class="px-4 py-3.5 text-[11px] text-slate-400 whitespace-nowrap" onclick="showDetail('${j.id}')">${timeStr}</td>
      <td class="px-4 py-3.5">
        <div class="flex items-center justify-end gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
          <button onclick="deleteJobById('${j.id}',event)"
            class="w-7 h-7 flex items-center justify-center text-red-400 hover:text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg transition-colors">
            <i class="fa-solid fa-trash-can text-xs"></i>
          </button>
          <i class="fa-solid fa-chevron-right text-slate-300 dark:text-slate-600 text-xs"></i>
        </div>
      </td>
    </tr>`;
  }).join('');
}

function populateLangFilter(jobs) {
  const langs = [...new Set(jobs.map(j => j.language))].sort();
  const sel = document.getElementById('langFilter');
  const cur = sel.value;
  sel.innerHTML = '<option value="">Barcha tillar</option>' +
    langs.map(l => `<option value="${l}" ${l===cur?'selected':''}>${l}</option>`).join('');
}

function updatePagination(count, total) {
  const pg = document.getElementById('pagination');
  if (currentOffset === 0 && count < PAGE_SIZE) { pg.classList.add('hidden'); return; }
  pg.classList.remove('hidden');
  const page = Math.floor(currentOffset / PAGE_SIZE) + 1;
  const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  document.getElementById('pageInfo').textContent = `Sahifa ${page} / ${totalPages}`;
  document.getElementById('prevBtn').disabled = currentOffset === 0;
  document.getElementById('nextBtn').disabled = currentOffset + count >= total;
}

function changePage(dir) {
  currentOffset = Math.max(0, currentOffset + dir * PAGE_SIZE);
  clearSelection(); loadJobs();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Detail panel ───────────────────────────────────────────────
async function showDetail(id) {
  currentDetailId = id;
  activeTab = 'kod';
  switchTab('kod');
  document.getElementById('detailPanel').classList.remove('hidden');
  const loadingHtml = `<div class="p-8 text-center text-slate-400 text-sm">
    <i class="fa-solid fa-circle-notch spin text-xl mb-2 block text-sky-500"></i>Yuklanmoqda...</div>`;
  document.getElementById('kodContent').innerHTML = loadingHtml;
  document.getElementById('panelNatija').innerHTML = loadingHtml;

  try {
    const res = await fetch(`/api/v2/jobs/${id}`, { headers: authHeaders() });
    if (!res.ok) {
      const err = (await res.json().catch(()=>({}))).message || 'Xato';
      document.getElementById('kodContent').innerHTML = `<p class="p-5 text-red-500 text-sm">${err}</p>`;
      return;
    }
    const j = await res.json();
    const m = getMeta(j.language);

    // Header title
    document.getElementById('detailTitle').innerHTML = `
      <div class="flex items-center gap-2 min-w-0 flex-wrap">
        <div class="w-6 h-6 rounded-md flex items-center justify-center flex-shrink-0 bg-slate-100 dark:bg-slate-800" style="color:${m.color}">
          <i class="${m.icon} text-xs"></i>
        </div>
        <span class="text-sm font-bold text-slate-800 dark:text-white capitalize">${j.language}</span>
        <span class="text-xs text-slate-400 font-mono">v${j.version}</span>
        ${j.username ? `<span class="text-xs text-slate-400">· ${j.username}</span>` : ''}
        <span class="text-xs text-slate-300 dark:text-slate-600 font-mono hidden sm:inline">${new Date(j.created_at).toLocaleString()}</span>
      </div>`;

    // ── Kod tab ──
    const hasCode = j.code && j.code.trim();
    document.getElementById('kodContent').innerHTML = hasCode
      ? `<div class="relative group/code h-full">
          <div class="flex items-center justify-between px-4 py-2.5 bg-slate-800 dark:bg-slate-950 rounded-t-xl border border-slate-700 border-b-0">
            <div class="flex items-center gap-2">
              <div class="flex gap-1.5">
                <div class="w-2.5 h-2.5 rounded-full bg-red-500/70"></div>
                <div class="w-2.5 h-2.5 rounded-full bg-yellow-500/70"></div>
                <div class="w-2.5 h-2.5 rounded-full bg-green-500/70"></div>
              </div>
              <span class="text-xs text-slate-400 font-mono ml-1 capitalize">${j.language}</span>
            </div>
            <button onclick="copyCode()" title="Nusxa olish"
              class="flex items-center gap-1.5 text-xs text-slate-400 hover:text-slate-200 transition-colors px-2 py-1 rounded-md hover:bg-slate-700">
              <i class="fa-regular fa-copy"></i>
              <span id="copyLabel">Nusxa</span>
            </button>
          </div>
          <pre id="codeDisplay" class="code-block bg-slate-900 dark:bg-slate-950 text-slate-100 border border-slate-700 border-t-0 rounded-b-xl p-4 max-h-[calc(100vh-220px)] overflow-auto">${escHtml(j.code)}</pre>
        </div>`
      : `<div class="flex flex-col items-center justify-center h-full py-16 text-slate-400 dark:text-slate-600">
          <i class="fa-solid fa-file-slash text-3xl mb-3 opacity-50"></i>
          <p class="text-sm">Kod saqlanmagan</p>
          <p class="text-xs mt-1 opacity-70">Eski joblar uchun kod mavjud emas</p>
        </div>`;

    // ── Natija tab ──
    let html = '';
    if (j.compile_exit !== null && j.compile_exit !== undefined) {
      html += buildStageBlock('Compile', j.compile_exit, j.compile_status, j.compile_time, j.compile_memory, j.compile_stdout, j.compile_stderr);
    }
    html += buildStageBlock('Run', j.run_exit, j.run_status, j.run_time, j.run_memory, j.run_stdout, j.run_stderr);
    html += `<div class="text-[10px] text-slate-400 dark:text-slate-600 font-mono pt-2 border-t border-slate-100 dark:border-slate-800">
      ID: ${j.id}
    </div>`;
    document.getElementById('panelNatija').innerHTML = html;

    // Store code for copy
    window._detailCode = j.code || '';
  } catch(e) {
    document.getElementById('kodContent').innerHTML = `<p class="p-5 text-red-500 text-sm">${e.message}</p>`;
  }
}

function buildStageBlock(label, exit, status, time, memory, stdout, stderr) {
  const isCompile = label === 'Compile';
  const ok = exit === 0 && !status;
  return `
  <div class="rounded-xl border ${ok ? 'border-emerald-200 dark:border-emerald-900/40' : 'border-slate-200 dark:border-slate-700'} overflow-hidden">
    <div class="flex items-center gap-3 px-4 py-2.5 ${ok ? 'bg-emerald-50 dark:bg-emerald-900/20' : 'bg-slate-50 dark:bg-slate-800/60'} flex-wrap gap-y-1">
      <span class="text-[10px] font-bold uppercase tracking-widest text-slate-500 dark:text-slate-400">${label}</span>
      ${badge(exit, status)}
      ${time   != null ? `<span class="text-xs text-slate-400 font-mono ml-auto">${time}ms</span>` : ''}
      ${memory != null ? `<span class="text-xs text-slate-400 font-mono">${(memory/1024).toFixed(0)}KB</span>` : ''}
    </div>
    <div class="p-3 space-y-2">
      ${outputBlock('stdout', stdout)}
      ${outputBlock('stderr', stderr)}
    </div>
  </div>`;
}

function outputBlock(label, content) {
  if (!content || !content.trim()) return `<p class="text-xs text-slate-400 dark:text-slate-600 italic">${label}: bo'sh</p>`;
  return `<div>
    <p class="text-[10px] font-semibold uppercase tracking-wider text-slate-400 dark:text-slate-500 mb-1">${label}</p>
    <pre class="text-xs bg-slate-950 text-emerald-400 rounded-lg p-3 overflow-auto max-h-48 font-mono whitespace-pre-wrap break-all">${escHtml(content)}</pre>
  </div>`;
}

function copyCode() {
  if (!window._detailCode) return;
  navigator.clipboard.writeText(window._detailCode).then(() => {
    const lbl = document.getElementById('copyLabel');
    if (lbl) { lbl.textContent = 'Nusxalandi!'; setTimeout(() => lbl.textContent = 'Nusxa', 2000); }
  }).catch(() => toast('Nusxa olishda xato', 'error'));
}

function closeDetail() {
  document.getElementById('detailPanel').classList.add('hidden');
  currentDetailId = null;
  window._detailCode = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });

// ── Toast ──────────────────────────────────────────────────────
function toast(msg, type = 'info') {
  const c = { success:'bg-emerald-600', error:'bg-red-600', info:'bg-sky-600' };
  const i = { success:'fa-circle-check', error:'fa-circle-xmark', info:'fa-circle-info' };
  const el = document.createElement('div');
  el.className = `toast pointer-events-auto flex items-center gap-3 px-4 py-3 rounded-xl text-white text-sm shadow-xl ${c[type]}`;
  el.innerHTML = `<i class="fa-solid ${i[type]} flex-shrink-0"></i><span>${msg}</span>`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => { el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(()=>el.remove(),300); }, 4000);
}

loadJobs();
</script>
</body>
</html>
